name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Install frontend dependencies
        run: npm ci
      - name: Build native frontend bundle
        run: npm run build:native
      - name: Sync Capacitor Android project
        run: npx cap sync android
      # assembleDebug 使用 Gradle 自动生成的 debug keystore，可直接侧载安装；不涉及 Google Play 签名。
      - name: Build installable debug APK
        run: cd android && ./gradlew --no-daemon assembleDebug
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nutrimind-android-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
