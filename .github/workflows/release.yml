name: Publish Native Applications

on:
  push:
    tags: ["v*"]

# 同一个 tag 的重跑不能与尚未完成的发布互相覆盖。
concurrency:
  group: native-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  android:
    name: Android debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Install frontend dependencies
        run: npm ci
      - name: Build native frontend bundle
        run: npm run build:native
      - name: Sync Capacitor Android project
        run: npx cap sync android
      - name: Build installable debug APK
        run: cd android && ./gradlew --no-daemon assembleDebug
      - name: Collect release APK
        run: |
          mkdir -p release-assets
          cp android/app/build/outputs/apk/debug/app-debug.apk "release-assets/NutriMind-${GITHUB_REF_NAME}-android-debug.apk"
      - name: Upload Android release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: frontend/release-assets/*
          if-no-files-found: error
          retention-days: 1

  desktop:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows installer
            os: windows-latest
            artifact: release-windows
            release_paths: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
          - name: macOS installer
            os: macos-latest
            artifact: release-macos
            release_paths: |
              src-tauri/target/release/bundle/dmg/*.dmg
          - name: Linux installers
            os: ubuntu-latest
            artifact: release-linux
            release_paths: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
              src-tauri/target/release/bundle/appimage/*.AppImage
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Set up Rust
        shell: bash
        run: |
          rustup update stable
          rustup default stable
      - name: Install Linux bundle dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Install frontend dependencies
        run: npm ci
      - name: Build desktop application
        run: npm run tauri:build
      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets
          shopt -s nullglob
          while IFS= read -r pattern; do
            for asset in $pattern; do
              cp "$asset" release-assets/
            done
          done <<'RELEASE_PATHS'
          ${{ matrix.release_paths }}
          RELEASE_PATHS
          test -n "$(find release-assets -type f -print -quit)"
      - name: Upload desktop release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: frontend/release-assets/*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: [android, desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* --generate-notes --title "NutriMind $GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY"
          fi
